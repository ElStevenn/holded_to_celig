version: "3.8"

services:
  app:
    build: .
    container_name: app_service
    restart: unless-stopped
    depends_on:
      - redis
    networks: [holded_celig_network]
    ports:
      - "8080:8000"                # host:container
    environment:
      BASIC_AUTH_USER: luis
      BASIC_AUTH_PASS: 12345
      # cualquier otra variable que uses
    volumes:
      - ./src/config/credentials.json:/app/src/config/credentials.json:rw  # persiste cambios
      - ./subcuentas.txt:/app/subcuentas.txt:rw  # comparte el mismo archivo con el contenedor
    command: >
      hypercorn src.quart_app.app:app --bind 0.0.0.0:8000 --worker-class asyncio
  redis:
    image: redis:latest
    container_name: redis_service
    restart: unless-stopped
    networks: [holded_celig_network]
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]  # no host port → no clash

  celery_worker:
    build: .
    container_name: celery_worker
    restart: unless-stopped
    depends_on: [redis]
    networks: [holded_celig_network]
    environment:
      REDIS_URL: redis://redis:6379/0
      AUTO_MIGRATION_ENABLED: ${AUTO_MIGRATION_ENABLED:-true}
      AUTO_MIGRATION_INTERVAL_DAYS: ${AUTO_MIGRATION_INTERVAL_DAYS:-30}
    volumes:
      - ./src/config/credentials.json:/app/src/config/credentials.json:rw
    command: >
      celery -A src.workers.celery_config worker --loglevel=info

  celery_beat:
    build: .
    container_name: celery_beat
    restart: unless-stopped
    depends_on: [redis]
    networks: [holded_celig_network]
    environment:
      REDIS_URL: redis://redis:6379/0
      AUTO_MIGRATION_ENABLED: ${AUTO_MIGRATION_ENABLED:-true}
      AUTO_MIGRATION_INTERVAL_DAYS: ${AUTO_MIGRATION_INTERVAL_DAYS:-30}
    volumes:
      - ./src/config/credentials.json:/app/src/config/credentials.json:ro
    command: >
      celery -A src.workers.celery_config beat --loglevel=info

  caddy:
    image: caddy:2.7-alpine
    container_name: caddy_reverse_proxy
    restart: unless-stopped
    depends_on:
      - app
    networks: [holded_celig_network]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  holded_celig_network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
